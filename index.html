<!doctype html>
<html>
  <head>
    <title>F1 Race Archive</title>
    <meta name="description" content="A Catalog of F1 Races" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" defer src="scripts.js"></script> <!-- Defer resolves eventlistener issues -->
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">F1 Race Archive</h1>
      <p class="subtitle">A curated catalog of Formula 1 races to browse race data, search key details, filter, sort, and manage entries with CRUD functionality</p>
    </header>
    
    <main>
      <section class="controls">
        <input type="text" id="search-input" placeholder="Search by..."/>
        
        <select id="season-filter">
          <option value="all">All Seasons</option>
        </select>

        <select id="circuit-filter">
          <option value="all">All Circuits</option>
        </select>

        <select id="weather-filter">
          <option value="all">All Weather</option>
        </select>

        <select id="sort-select">
          <option value="default">Sort By</option>
          <option value="season-ascending">Season (Oldest First)</option>
          <option value="season-descending">Season (Newest First)</option>
        </select>
      </section>

      <section>
        <h2 class="section-title">Race Catalog</h2>
        <div id="card-container"></div>
      </section>

      <section class="form-section">
        <h2>Add Race</h2>
        <form id="race-form">
          <input type="hidden" id="race-id"/>
          <input type="number" id="season" placeholder="Season" required/>
          <input type="date" id="date" placeholder="Date" required/>
          <input type="text" id="race-name" placeholder="Race Name" required/>
          <input type="text" id="circuit" placeholder="Circuit" required/>
          <input type="text" id="country" placeholder="Country" required/>
          <input type="text" id="winner-driver" placeholder="Winning Driver" required/>
          <input type="text" id="winner-team" placeholder="Winning Team" required/>
          <input type="number" id="laps" placeholder="Laps" required/>
          <input type="text" id="fastest-lap" placeholder="Fastest Lap" required/>
          <input type="text" id="weather" placeholder="Weather" required/>
          <button type="submit">Save Race</button>
        </form>
      </section>

    </main>
